description: Beacon PRO+ is a contractor-facing digital ordering and account-management platform. The
  PRO+ API is published to enable integrations with contractor management software (AccuLynx, JobNimbus)
  and ERP systems. Access is provided to existing Beacon contractor account holders and partner ISVs;
  there is no public per-call rate card. Beacon was acquired by QXO in 2025.
notes: No public API pricing. PRO+ API access is bundled with the contractor's Beacon account relationship
  and partner integrations are arranged with Beacon's digital team. Reconcile against the partner / contractor
  agreement once available.
sources:
  - https://beaconproplus.com/swagger/all_api/
  - https://beaconproplus.com
plans:
  - id: beacon-roofing-supply-pro-plus
    name: Beacon PRO+ Account
    type: enterprise
    description: API access included with a Beacon PRO+ contractor account or a partner ISV integration
      agreement. Underlying material pricing flows from the customer's Beacon account terms.
    entries:
      - label: Contractor Account
        description: API access included with an active Beacon PRO+ contractor account
        name: contractor_account
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: US
        domains:
          - https://beaconproplus.com
        unit: 1
        price: included with PRO+ account
        userMultiplied: false
      - label: Partner Integration
        description: ISV partner integration agreement (AccuLynx, JobNimbus, custom partners)
        name: partner_integration
        type: subscription
        metric: year
        limit: -1
        timeFrame: year
        geo: US
        domains:
          - https://beaconproplus.com
        unit: 1
        price: contact Beacon partner team
        userMultiplied: false
      - label: Material Purchases
        description: Underlying product purchases at the contractor's negotiated Beacon pricing
        name: material_purchases
        type: metered
        metric: order
        limit: -1
        timeFrame: usage
        geo: US
        domains:
          - https://beaconproplus.com
        unit: 1
        price: per Beacon account terms
        userMultiplied: false
    elements:
      - name: Beacon PRO+ API
      - name: Real-Time Inventory and Pricing
      - name: Online Ordering and Delivery Tracking
      - name: Account Management
      - name: Manufacturer Rebate Tracking
      - name: AccuLynx / JobNimbus Integration
      - name: Swagger UI Documentation
