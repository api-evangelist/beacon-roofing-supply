specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Beacon Roofing Supply
providerId: beacon-roofing-supply
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Construction
  - Roofing
  - Distribution
  - E-Commerce
  - Rate Limiting
description: Beacon does not publish public rate limits for the PRO+ API. The Swagger documentation describes
  the surface but does not include rate-limit numerics. Limits are managed at the contractor account /
  partner integration level. No numeric values are asserted here.
notes: Reconcile against partner integration documentation issued during Beacon ISV onboarding. Do not
  invent throughput numbers.
sources:
  - https://beaconproplus.com/swagger/all_api/
responseCodes:
  throttled: 429
limits:
  - name: Per-account / per-partner throttle
    scope: account
    metric: varies
    limit: 'see Beacon partner onboarding documentation'
    notes: Contractor account and ISV partner applications are throttled; specific numbers are not public.
policies:
  - name: Backoff Strategy
    description: Use exponential backoff with jitter on 429; honor Retry-After when returned.
  - name: Swagger-Documented Surface
    description: The PRO+ API surface is described via Swagger UI; rate-limit specifics live with the
      partner integration team rather than in the public docs.
  - name: Inventory and Price Polling
    description: Real-time inventory and pricing endpoints are the most heavily polled; cache per Beacon's
      partner guidance to stay within capacity.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
