name: Beacon Roofing Supply
description: >-
  Beacon Roofing Supply (BECN) is one of the largest distributors of residential and
  non-residential roofing materials and complementary building products in North America.
  Beacon operates the Beacon PRO+ digital platform providing roofing contractors with
  real-time inventory, pricing, online ordering, delivery tracking, and account management.
  Beacon PRO+ offers a REST API and Swagger-documented integration layer for contractor
  management software, ERP systems, and roofing business applications. Beacon was acquired
  by QXO in 2025.
