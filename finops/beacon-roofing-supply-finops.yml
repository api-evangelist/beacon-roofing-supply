specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Beacon Roofing Supply
providerId: beacon-roofing-supply
publisherName: Beacon Roofing Supply, Inc. (a QXO company)
serviceCategory: Construction Distribution / E-Commerce APIs
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Construction
  - Roofing
  - Distribution
  - E-Commerce
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps shape for Beacon PRO+: API access bundled with the contractor account,
  with the dominant cost category being underlying material purchases and delivery fees rather than API
  consumption.'
notes: No public rate card. Replace meter values with the contractor's negotiated Beacon account terms
  and ISV integration scope once available.
sources:
  - https://beaconproplus.com
  - https://beaconproplus.com/swagger/all_api/
principles:
  - name: Visibility
    description: Use the PRO+ API to surface order, delivery, and rebate data to the contractor's job-cost
      ledger so material spend can be attributed per job.
  - name: Allocation
    description: Allocate material orders to jobs / projects via contractor PO and job-number metadata
      passed through the API.
  - name: Optimization
    description: Optimize delivery scheduling and consolidate orders to minimize delivery fees; track
      manufacturer rebates through the API to capture the full earned value.
  - name: Accountability
    description: Designate a project manager or operations lead as the Beacon account owner who reviews
      monthly statements and rebate accruals.
billingModel:
  pricingCategory: Account-Based Material Spend
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
    - Refund
    - Credit
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Beacon PRO+
  ServiceCategory: Construction Distribution / E-Commerce APIs
  ProviderName: Beacon Roofing Supply
  PublisherName: Beacon Roofing Supply, Inc.
  InvoiceIssuerName: Beacon Roofing Supply, Inc.
  PricingCategory: Account-Based Material Spend
  PricingUnit: order
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: orders
    description: Orders placed through the PRO+ API
    unit: order
    aggregation: sum
    dimensions:
      - account
      - job
      - branch
  - name: order_volume
    description: Material spend value via the PRO+ API
    unit: USD
    aggregation: sum
    dimensions:
      - account
      - job
      - product_category
  - name: deliveries
    description: Delivery events tracked via the API
    unit: delivery
    aggregation: sum
    dimensions:
      - account
      - branch
  - name: rebates
    description: Manufacturer rebates accrued / surfaced through the API
    unit: USD
    aggregation: sum
    dimensions:
      - manufacturer
      - product_category
apis:
  - name: Beacon PRO+ API
    baseURL: ''
    tags:
      - Construction
      - Roofing
      - Distribution
      - E-Commerce
    serviceName: Beacon PRO+ API
    serviceCategory: API
unitEconomics:
  - name: Cost per Job
    metric: order_volume / active_jobs
    target: align to job estimate
  - name: Rebate Capture Rate
    metric: rebates / order_volume
    target: maximize per manufacturer program
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
